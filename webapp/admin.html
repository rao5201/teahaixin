<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茶海心遇 - 管理后台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b1a;--card:#12122a;--border:#1e1e3a;--text:#e0d6ff;--sub:#8b82b0;--accent:#6c5ce7;--green:#00b894;--yellow:#fdcb6e;--red:#e17055;--blue:#0984e3}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#header{background:linear-gradient(135deg,#1a1a3e,#12122a);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.brand{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.brand-icon{font-size:28px}
.header-right{display:flex;align-items:center;gap:16px;color:var(--sub);font-size:13px}
#btn-refresh{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;transition:opacity .2s}
#btn-refresh:hover{opacity:.85}
#main{max-width:1200px;margin:0 auto;padding:24px}
#loading{text-align:center;padding:100px 0;color:var(--sub);font-size:18px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;transition:transform .2s}
.kpi-card:hover{transform:translateY(-2px)}
.kpi-value{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--accent),#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.kpi-label{font-size:13px;color:var(--sub);margin-top:6px}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:4px;opacity:.7}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px}
.card-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-box{height:280px}
.chart-card{min-height:340px}
/* Satisfaction */
.sat-header{display:flex;align-items:center;gap:24px;margin-bottom:20px}
.sat-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:36px;font-weight:800;border:4px solid var(--accent);flex-shrink:0}
.sat-circle .grade{font-size:14px;font-weight:600;color:var(--sub);margin-top:2px}
.sat-info h3{font-size:18px;margin-bottom:8px}
.sat-info p{color:var(--sub);font-size:14px;line-height:1.6}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--sub);font-weight:600;font-size:12px;text-transform:uppercase}
td{color:var(--text)}
.bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;min-width:60px}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-green{background:rgba(0,184,148,.15);color:var(--green)}
.tag-yellow{background:rgba(253,203,110,.15);color:var(--yellow)}
.tag-red{background:rgba(225,112,85,.15);color:var(--red)}
.tag-blue{background:rgba(9,132,227,.15);color:var(--blue)}
@media(max-width:768px){
  .charts-row{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .sat-header{flex-direction:column;text-align:center}
  #main{padding:16px}
}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-inner">
      <div class="brand"><span class="brand-icon">🍵</span> 茶海心遇 · 数据中心</div>
      <div class="header-right">
        <span id="refresh-time">--</span>
        <button id="btn-refresh" onclick="loadData()">刷新</button>
      </div>
    </div>
  </header>
  <main id="main">
    <div id="loading">加载中...</div>
    <div id="content" style="display:none;">
      <!-- KPI Cards -->
      <section class="kpi-row" id="kpi-row"></section>
      <!-- Satisfaction Score -->
      <section class="card satisfaction-card" id="satisfaction-section"></section>
      <!-- Charts Row 1 -->
      <section class="charts-row">
        <div class="card chart-card"><div class="card-title">每日消息量趋势</div><div id="chart-daily" class="chart-box"></div></div>
        <div class="card chart-card"><div class="card-title">用户注册趋势</div><div id="chart-reg" class="chart-box"></div></div>
      </section>
      <!-- Charts Row 2 -->
      <section class="charts-row">
        <div class="card chart-card"><div class="card-title">情绪分布</div><div id="chart-emotion" class="chart-box"></div></div>
        <div class="card chart-card"><div class="card-title">用户活跃时段</div><div id="chart-hourly" class="chart-box"></div></div>
      </section>
      <!-- Tables -->
      <section class="charts-row">
        <div class="card chart-card"><div class="card-title">满意度评分明细</div><div id="table-satisfaction"></div></div>
        <div class="card chart-card"><div class="card-title">热门AI茶友 TOP10</div><div id="table-top-ai"></div></div>
      </section>
    </div>
  </main>
</div>
<script>
const API = 'https://rao5201-teahaixin-api.hf.space';
const KEY = 'teahaixin-admin-2024';

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  try {
    const r = await fetch(`${API}/api/admin/stats?key=${KEY}`);
    const json = await r.json();
    if (!json.success) throw new Error(json.message);
    render(json.data);
    document.getElementById('refresh-time').textContent = '更新: ' + new Date().toLocaleTimeString('zh-CN');
  } catch (e) {
    document.getElementById('loading').textContent = '加载失败: ' + e.message;
    return;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function render(d) {
  renderKPI(d);
  renderSatisfaction(d.satisfaction);
  renderDailyChart(d.production);
  renderRegChart(d.distributions.registrationTrend);
  renderEmotionChart(d.distributions.emotions);
  renderHourlyChart(d.distributions.hourlyActivity);
  renderSatisfactionTable(d.satisfaction.details);
  renderTopAI(d.distributions.topAIFriends);
}

function renderKPI(d) {
  const o = d.overview, p = d.production;
  const cards = [
    { value: o.totalUsers, label: '注册用户', sub: `今日+${o.todayUsers} / 本周+${o.weekUsers}` },
    { value: o.activeToday, label: '今日活跃', sub: `使用率 ${o.usageRate.daily}%` },
    { value: o.activeWeek, label: '周活跃', sub: `使用率 ${o.usageRate.weekly}%` },
    { value: o.activeMonth, label: '月活跃', sub: `使用率 ${o.usageRate.monthly}%` },
    { value: p.totalMessages, label: '总消息量', sub: `用户${p.userMessages} / AI${p.aiMessages}` },
    { value: p.totalEmotions, label: '情绪生成', sub: '心语总产量' },
    { value: p.totalResonances, label: '共鸣连接', sub: '情感匹配次数' },
    { value: o.totalAI, label: 'AI茶友', sub: '虚拟茶友账号' }
  ];
  document.getElementById('kpi-row').innerHTML = cards.map(c =>
    `<div class="kpi-card"><div class="kpi-value">${formatNum(c.value)}</div><div class="kpi-label">${c.label}</div><div class="kpi-sub">${c.sub}</div></div>`
  ).join('');
}

function renderSatisfaction(s) {
  const colors = { 'A+': '#00b894', 'A': '#00b894', 'B+': '#0984e3', 'B': '#0984e3', 'C+': '#fdcb6e', 'C': '#fdcb6e', 'D+': '#e17055', 'D': '#e17055' };
  const color = colors[s.grade] || '#e17055';
  const msgs = {
    'A+': '用户非常满意，产品体验极佳！',
    'A': '用户满意度较高，各项指标表现良好。',
    'B+': '用户体验良好，部分指标有提升空间。',
    'B': '整体表现中等偏上，建议优化用户留存。',
    'C+': '部分指标需要关注，建议加强用户运营。',
    'C': '满意度一般，需要重点提升用户粘性。',
    'D+': '产品处于早期阶段，需持续推广吸引用户。',
    'D': '数据量较少，建议先推广积累用户基础。'
  };
  document.getElementById('satisfaction-section').innerHTML = `
    <div class="card-title">客户满意度综合评分</div>
    <div class="sat-header">
      <div class="sat-circle" style="border-color:${color};color:${color}">
        ${s.score}<div class="grade">${s.grade}</div>
      </div>
      <div class="sat-info">
        <h3>满意度等级: ${s.grade}</h3>
        <p>${msgs[s.grade] || msgs['D']}</p>
        <p style="margin-top:8px">回头率 <b>${s.returnRate}%</b> · 人均消息 <b>${s.avgMsgPerUser}</b>条 · AI回复率 <b>${s.aiReplyRate}%</b></p>
      </div>
    </div>`;
}

function renderDailyChart(p) {
  const chart = echarts.init(document.getElementById('chart-daily'));
  const days = p.dailyProduction.map(d => d.day.slice(5));
  const msgs = p.dailyProduction.map(d => d.messages);
  chart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: 50, right: 20, top: 20, bottom: 30 },
    xAxis: { type: 'category', data: days, axisLabel: { color: '#8b82b0' }, axisLine: { lineStyle: { color: '#1e1e3a' } } },
    yAxis: { type: 'value', axisLabel: { color: '#8b82b0' }, splitLine: { lineStyle: { color: '#1e1e3a' } } },
    series: [{
      data: msgs, type: 'bar', itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#6c5ce7' }, { offset: 1, color: '#a29bfe' }]), borderRadius: [4, 4, 0, 0] },
      barWidth: '60%'
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderRegChart(trend) {
  const chart = echarts.init(document.getElementById('chart-reg'));
  chart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: 50, right: 20, top: 20, bottom: 30 },
    xAxis: { type: 'category', data: trend.map(d => d.day.slice(5)), axisLabel: { color: '#8b82b0' }, axisLine: { lineStyle: { color: '#1e1e3a' } } },
    yAxis: { type: 'value', axisLabel: { color: '#8b82b0' }, splitLine: { lineStyle: { color: '#1e1e3a' } } },
    series: [{
      data: trend.map(d => d.count), type: 'line', smooth: true,
      lineStyle: { color: '#00b894', width: 3 },
      areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(0,184,148,.3)' }, { offset: 1, color: 'rgba(0,184,148,.02)' }]) },
      itemStyle: { color: '#00b894' }
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderEmotionChart(emotions) {
  const chart = echarts.init(document.getElementById('chart-emotion'));
  const colors = ['#6c5ce7','#00b894','#0984e3','#fdcb6e','#e17055','#fd79a8','#a29bfe','#55efc4'];
  chart.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
    series: [{
      type: 'pie', radius: ['40%', '70%'], center: ['50%', '50%'],
      data: emotions.map((e, i) => ({ value: e.count, name: e.emotion || '未知', itemStyle: { color: colors[i % colors.length] } })),
      label: { color: '#e0d6ff', fontSize: 12 },
      emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,.3)' } }
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderHourlyChart(hours) {
  const chart = echarts.init(document.getElementById('chart-hourly'));
  const allHours = Array.from({ length: 24 }, (_, i) => i);
  const hourMap = {};
  hours.forEach(h => hourMap[h.hour] = h.count);
  chart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: 50, right: 20, top: 20, bottom: 30 },
    xAxis: { type: 'category', data: allHours.map(h => h + '时'), axisLabel: { color: '#8b82b0', fontSize: 10 }, axisLine: { lineStyle: { color: '#1e1e3a' } } },
    yAxis: { type: 'value', axisLabel: { color: '#8b82b0' }, splitLine: { lineStyle: { color: '#1e1e3a' } } },
    series: [{
      data: allHours.map(h => hourMap[h] || 0), type: 'line', smooth: true,
      lineStyle: { color: '#0984e3', width: 2 },
      areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(9,132,227,.3)' }, { offset: 1, color: 'rgba(9,132,227,.02)' }]) },
      itemStyle: { color: '#0984e3' }
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderSatisfactionTable(details) {
  const html = `<table><thead><tr><th>指标</th><th>当前值</th><th>得分</th><th>权重</th><th>进度</th></tr></thead><tbody>` +
    details.map(d => {
      const s = parseInt(d.score);
      const cls = s >= 70 ? 'green' : s >= 40 ? 'yellow' : 'red';
      return `<tr><td>${d.name}</td><td>${d.value}</td><td><span class="tag tag-${cls}">${d.score}分</span></td><td>${d.weight}</td>
        <td><div class="bar"><div class="bar-fill" style="width:${d.score}%;background:var(--${cls})"></div></div></td></tr>`;
    }).join('') + `</tbody></table>`;
  document.getElementById('table-satisfaction').innerHTML = html;
}

function renderTopAI(friends) {
  if (!friends.length) { document.getElementById('table-top-ai').innerHTML = '<p style="color:var(--sub)">暂无数据</p>'; return; }
  const max = friends[0]?.msg_count || 1;
  const html = `<table><thead><tr><th>#</th><th>茶友</th><th>消息数</th><th>热度</th></tr></thead><tbody>` +
    friends.map((f, i) => {
      const pct = (f.msg_count / max * 100).toFixed(0);
      return `<tr><td>${i + 1}</td><td>${f.username.replace('AI_', '')}</td><td>${f.msg_count}</td>
        <td><div class="bar"><div class="bar-fill" style="width:${pct}%;background:var(--accent)"></div></div></td></tr>`;
    }).join('') + `</tbody></table>`;
  document.getElementById('table-top-ai').innerHTML = html;
}

function formatNum(n) {
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n;
}

loadData();
</script>
</body>
</html>
