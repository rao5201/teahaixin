services:
  - type: web
    runtime: node
    name: teahaixin-api
    repo: https://github.com/rao5201/teahaixin
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
